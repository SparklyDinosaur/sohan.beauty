<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pong vs Sohan — sohan.beauty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{
      background:#05050f;color:#f0f0ff;
      font-family:'Inter',system-ui,sans-serif;
      display:flex;flex-direction:column;
    }

    /* ── Nav ── */
    .pong-nav{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 24px;
      background:rgba(5,5,15,0.97);
      border-bottom:1px solid rgba(255,255,255,0.06);
      flex-shrink:0;
    }
    .pong-nav a{color:#6666aa;text-decoration:none;font-size:.85rem;font-weight:600;transition:color .2s}
    .pong-nav a:hover{color:#f0f0ff}
    .pong-logo{
      font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:900;
      background:linear-gradient(90deg,#FF4DAD,#AA00FF,#2979FF);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .pong-nav-links{display:flex;gap:20px;list-style:none}

    /* ── Score bar ── */
    .score-bar{
      display:flex;align-items:center;justify-content:center;gap:28px;
      padding:10px 24px 6px;flex-shrink:0;
    }
    .score-side{text-align:center;flex:1}
    .score-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#555577;margin-bottom:2px}
    .score-num{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:900;line-height:1}
    .score-you .score-num{color:#2979FF}
    .score-sohan .score-num{
      background:linear-gradient(90deg,#FF003C,#FF8C00,#FFE500,#00C853,#2979FF,#AA00FF);
      background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;animation:shimmer 2s linear infinite
    }
    @keyframes shimmer{to{background-position:200% center}}
    .score-vs{color:#333355;font-weight:700;font-size:1.1rem;flex-shrink:0}

    /* ── Game canvas area ── */
    .game-area{
      flex:1;display:flex;align-items:center;justify-content:center;
      padding:8px 16px 12px;overflow:hidden;
    }
    .canvas-wrap{position:relative;display:inline-block}
    .canvas-wrap::before{
      content:'';position:absolute;inset:-3px;border-radius:14px;
      background:linear-gradient(135deg,#FF003C,#FF8C00,#FFE500,#00C853,#2979FF,#AA00FF,#FF4DAD);
      background-size:300% 300%;animation:border-spin 3s linear infinite;z-index:-1;
    }
    @keyframes border-spin{to{background-position:300% 300%}}
    #pong{
      display:block;border-radius:12px;background:#06060f;
      max-width:100%;max-height:100%;
    }

    /* ── Controls hint ── */
    .hint{text-align:center;font-size:.75rem;color:#333355;padding:4px;flex-shrink:0}
    .hint span{color:#555577;font-weight:600}

    /* ── Mobile paddle buttons ── */
    .mobile-paddle{
      display:none;flex-shrink:0;
      padding:8px 16px 12px;gap:12px;
      align-items:center;justify-content:center;
    }
    @media(max-width:800px),(pointer:coarse){.mobile-paddle{display:flex}}
    .paddle-btn{
      flex:1;max-width:160px;height:54px;border-radius:14px;
      background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);
      color:#f0f0ff;font-size:1.6rem;font-weight:700;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;user-select:none;-webkit-user-select:none;
      touch-action:none;transition:background .1s;
    }
    .paddle-btn:active,.paddle-btn.active{background:rgba(41,121,255,0.35)}

    /* ── End overlay ── */
    #overlay{
      position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:100;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:24px;text-align:center;
    }
    #overlay.hidden{display:none}
    .ov-emoji{font-size:4rem;margin-bottom:12px;animation:pop .4s ease}
    @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
    .ov-img{
      width:110px;height:110px;border-radius:50%;object-fit:cover;object-position:top;
      margin:12px 0;border:3px solid #AA00FF;
      box-shadow:0 0 30px rgba(170,0,255,.6)
    }
    .ov-title{
      font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;
      margin-bottom:10px;
      background:linear-gradient(90deg,#FF003C,#FF8C00,#FFE500,#00C853,#2979FF,#AA00FF);
      background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;animation:shimmer 2s linear infinite
    }
    .ov-sub{font-size:.95rem;color:#9999bb;max-width:380px;line-height:1.6;margin-bottom:20px}
    .ov-btn{
      padding:13px 34px;
      background:linear-gradient(135deg,#FF1493,#AA00FF);
      color:#fff;border:none;border-radius:50px;
      font-size:.95rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;
      transition:transform .2s,box-shadow .2s
    }
    .ov-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,20,147,.5)}
  </style>
</head>
<body>

  <div id="overlay" class="hidden">
    <div class="ov-emoji" id="ov-emoji">👑</div>
    <img src="assets/sohan2.jpg" class="ov-img" alt="Sohan" />
    <div class="ov-title" id="ov-title">Sohan Wins!</div>
    <p class="ov-sub" id="ov-sub">Of course. Did you really think otherwise? 💅</p>
    <button class="ov-btn" id="ov-btn">Try Again 🏓</button>
  </div>

  <nav class="pong-nav">
    <a href="index.html">← sohan.beauty</a>
    <span class="pong-logo">sohan.beauty</span>
    <ul class="pong-nav-links">
      <li><a href="memes.html">Memes</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="loveletters.html">Love Letters</a></li>
    </ul>
  </nav>

  <div class="score-bar">
    <div class="score-side score-you">
      <div class="score-label">You</div>
      <div class="score-num" id="score-you">0</div>
    </div>
    <div class="score-vs">VS</div>
    <div class="score-side score-sohan">
      <div class="score-label">Sohan 👑</div>
      <div class="score-num" id="score-sohan">0</div>
    </div>
  </div>

  <div class="game-area">
    <div class="canvas-wrap">
      <canvas id="pong"></canvas>
    </div>
  </div>

  <p class="hint"><span>↑ ↓</span> / <span>W S</span> / Mouse / Touch to move</p>
  <div class="mobile-paddle">
    <button class="paddle-btn" id="paddle-up">▲</button>
    <button class="paddle-btn" id="paddle-down">▼</button>
  </div>

<script>
(() => {
  /* ═══════ SETUP ═══════════════════════════════════════════════════════ */
  const canvas = document.getElementById('pong');
  const ctx    = canvas.getContext('2d');
  const W = 700, H = 460;

  function resize() {
    const avW = Math.min(window.innerWidth  - 32, W);
    const avH = Math.min(window.innerHeight - 160, H);
    const sc  = Math.min(avW / W, avH / H);
    canvas.width  = W * sc;
    canvas.height = H * sc;
    canvas.style.width  = canvas.width  + 'px';
    canvas.style.height = canvas.height + 'px';
    canvas._sc = sc;
  }
  resize();
  window.addEventListener('resize', resize);

  const SC = () => canvas._sc || 1;

  /* ═══════ CONSTANTS ══════════════════════════════════════════════════ */
  const PW = 14, PH = 88, BR = 8;
  const PLAYER_X = 20;
  const AI_X     = W - 20 - PW;
  const WIN      = 11;
  const PORTRAIT_R = 44; // radius of Sohan's circular avatar above paddle

  /* ═══════ STATE ══════════════════════════════════════════════════════ */
  let scoreYou = 0, scoreSohan = 0, gameOver = false;

  const player = { y: H/2 - PH/2, flash: 0 };
  const ai     = { y: H/2 - PH/2, flash: 0 };
  const ball   = { x:0, y:0, vx:0, vy:0 };

  function resetBall() {
    ball.x = W/2; ball.y = H/2;
    const spd = 5.8;
    const ang = (Math.random() * .5 - .25);
    // Always serve toward player so AI can immediately demonstrate dominance
    ball.vx = -spd * Math.cos(ang);
    ball.vy = spd * Math.sin(ang);
  }
  resetBall();

  /* ═══════ PERFECT AI — predicts exact Y, never misses ═══════════════ */
  function predictY() {
    let bx = ball.x, by = ball.y, bvx = ball.vx, bvy = ball.vy;
    // Only predict when ball moving toward AI
    if (bvx <= 0) return H/2;
    let steps = 0;
    while (bx < AI_X + PW && steps < 2000) {
      bx += bvx; by += bvy;
      if (by <= BR)    { by = BR;    bvy = Math.abs(bvy); }
      if (by >= H - BR){ by = H-BR;  bvy = -Math.abs(bvy); }
      steps++;
    }
    return by;
  }

  function updateAI() {
    const target = predictY() - PH/2;
    const diff   = target - ai.y;
    // Move fast enough to always intercept — speed 14 is enough for any ball
    const spd = 14;
    ai.y += Math.sign(diff) * Math.min(Math.abs(diff), spd);
    ai.y  = Math.max(0, Math.min(H - PH, ai.y));
  }

  /* ═══════ INPUT ══════════════════════════════════════════════════════ */
  const keys = {};
  const mobileDir = {up:false, down:false};
  window.addEventListener('keydown', e => { keys[e.key] = true; });
  window.addEventListener('keyup',   e => { keys[e.key] = false; });

  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    player.y = Math.max(0, Math.min(H - PH, (e.clientY - r.top) / SC() - PH/2));
  });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    player.y = Math.max(0, Math.min(H - PH, (e.touches[0].clientY - r.top) / SC() - PH/2));
  }, {passive:false});

  // Mobile up/down buttons
  function holdPaddle(id, dir) {
    const el = document.getElementById(id);
    if (!el) return;
    const on  = () => { mobileDir[dir] = true;  el.classList.add('active'); };
    const off = () => { mobileDir[dir] = false; el.classList.remove('active'); };
    el.addEventListener('touchstart', e => { e.preventDefault(); on(); },  {passive:false});
    el.addEventListener('touchend',   e => { e.preventDefault(); off(); }, {passive:false});
    el.addEventListener('mousedown',  on);
    el.addEventListener('mouseup',    off);
    el.addEventListener('mouseleave', off);
  }
  holdPaddle('paddle-up',   'up');
  holdPaddle('paddle-down', 'down');

  function handleKeys() {
    if (keys['ArrowUp']   || keys['w'] || keys['W'] || mobileDir.up)   player.y = Math.max(0,    player.y - 6);
    if (keys['ArrowDown'] || keys['s'] || keys['S'] || mobileDir.down) player.y = Math.min(H-PH, player.y + 6);
  }

  /* ═══════ VOICELINES ════════════════════════════════════════════════ */
  const LINES_HIT = [
    "Too slow, babe 💅",
    "Nice try, darling ✨",
    "You'll have to do better than that 🏳️‍🌈",
    "Catch me if you can 😏",
    "The gays don't miss 👑",
    "Flawless. As always. 💖",
    "Did you really just—? 😂",
    "Serving returns AND looks 💜",
    "I'm literally not even trying 💅",
    "Honey, I've dodged harder things 🌈",
  ];
  const LINES_SCORE = [
    "Point to the icon 👑",
    "That's another one for Sohan 🏳️‍🌈",
    "YASSSS 💅✨",
    "Unstoppable. I can't help it. 💖",
    "You're making this too easy, babe 😘",
    "Rainbow power is real 🌈",
    "Gay excellence, documented 📸",
    "UC9 would be proud 💜",
    "I could do this all day 😏",
    "Another point, another serve 👑",
  ];
  const LINES_IDLE = [
    "Are you even trying? 👀",
    "I'm getting bored, babe 💅",
    "Come on, give me a challenge 🌈",
    "My nails look great from up here ✨",
    "The ball is RIGHT THERE 😂",
  ];

  let currentLine = '';
  let lineAlpha   = 0;
  let lineTimer   = 0;
  let idleTime    = 0;

  function showLine(lines) {
    currentLine = lines[Math.floor(Math.random() * lines.length)];
    lineAlpha   = 1;
    lineTimer   = 160; // frames to show
  }

  /* ═══════ PARTICLES ══════════════════════════════════════════════════ */
  const PRIDE = ['#FF003C','#FF8C00','#FFE500','#00C853','#2979FF','#AA00FF','#FF4DAD'];
  let particles = [];
  function burst(x, y) {
    for (let i=0; i<16; i++) {
      const a = (i/16)*Math.PI*2;
      particles.push({x,y,vx:Math.cos(a)*rnd(2,7),vy:Math.sin(a)*rnd(2,7),
        alpha:1,r:rnd(2,5),c:PRIDE[Math.floor(Math.random()*PRIDE.length)]});
    }
  }
  function rnd(a,b){return a+Math.random()*(b-a);}

  /* ═══════ COLLISION ══════════════════════════════════════════════════ */
  function paddleHit(px, py, isAI) {
    if (
      ball.x + BR > px && ball.x - BR < px + PW &&
      ball.y > py      && ball.y < py + PH
    ) {
      ball.vx *= -1.06;
      ball.vx = isAI ? -Math.abs(ball.vx) : Math.abs(ball.vx);
      const rel = (ball.y - (py + PH/2)) / (PH/2);
      ball.vy = rel * 7;
      // Cap speed
      const spd = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
      if (spd > 18) { ball.vx = ball.vx/spd*18; ball.vy = ball.vy/spd*18; }
      ball.x = isAI ? px - BR - 1 : px + PW + BR + 1;
      if (isAI) { ai.flash = 8; showLine(LINES_HIT); }
      else      { player.flash = 8; }
      return true;
    }
    return false;
  }

  /* ═══════ WIN CHECK ══════════════════════════════════════════════════ */
  const TAUNTS = [
    "Did you really think you had a chance? 💅",
    "Sohan never loses. It's just science. 🌈",
    "11-0. I'm not even sorry. 👑",
    "You played beautifully. (You didn't.) 😘",
    "Rematch? I'll still win. Obviously. ✨",
  ];
  function checkWin() {
    if (scoreSohan >= WIN) {
      gameOver = true;
      setTimeout(() => {
        document.getElementById('ov-emoji').textContent  = '👑';
        document.getElementById('ov-title').textContent  = 'Sohan Wins!';
        document.getElementById('ov-sub').textContent    = TAUNTS[Math.floor(Math.random()*TAUNTS.length)];
        document.getElementById('overlay').classList.remove('hidden');
      }, 500);
    }
  }

  document.getElementById('ov-btn').addEventListener('click', () => {
    gameOver = false; scoreYou = scoreSohan = 0;
    document.getElementById('score-you').textContent   = '0';
    document.getElementById('score-sohan').textContent = '0';
    player.y = ai.y = H/2 - PH/2;
    resetBall();
    document.getElementById('overlay').classList.add('hidden');
  });

  /* ═══════ SOHAN PORTRAIT IMAGE ═══════════════════════════════════════ */
  const portrait = new Image();
  portrait.src = 'assets/sohan.jpg'; // main hero shot above paddle

  /* ═══════ RAINBOW BALL COLOUR ════════════════════════════════════════ */
  let rainbowT = 0;

  /* ═══════ UPDATE ════════════════════════════════════════════════════ */
  function update() {
    if (gameOver) return;
    handleKeys();
    updateAI();

    ball.x += ball.vx;
    ball.y += ball.vy;

    // Wall bounce
    if (ball.y - BR <= 0)   { ball.y = BR+1;   ball.vy = Math.abs(ball.vy); }
    if (ball.y + BR >= H)   { ball.y = H-BR-1; ball.vy = -Math.abs(ball.vy); }

    // Paddle collisions
    paddleHit(PLAYER_X, player.y, false);
    paddleHit(AI_X,     ai.y,     true);

    // Ball exits left — Sohan scores
    if (ball.x < 0) {
      burst(20, ball.y);
      scoreSohan++;
      document.getElementById('score-sohan').textContent = scoreSohan;
      showLine(LINES_SCORE);
      checkWin();
      if (!gameOver) resetBall();
    }

    // Ball exits right — impossible because AI never misses, but safety net
    if (ball.x > W) {
      ball.vx = -Math.abs(ball.vx);
      ball.x = W - BR - 1;
    }

    // Particles
    particles.forEach(p => { p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.alpha-=0.025; });
    particles = particles.filter(p => p.alpha > 0);

    // Voiceline timer
    if (lineTimer > 0) {
      lineTimer--;
      if (lineTimer < 30) lineAlpha = lineTimer / 30;
    }

    // Idle voiceline
    idleTime++;
    if (idleTime > 300) { idleTime = 0; showLine(LINES_IDLE); }

    rainbowT = (rainbowT + 0.04) % 1;

    if (player.flash > 0) player.flash--;
    if (ai.flash    > 0) ai.flash--;
  }

  /* ═══════ DRAW ══════════════════════════════════════════════════════ */
  const STRIPE_COLS = ['#FF003C','#FF8C00','#FFE500','#00C853','#2979FF','#AA00FF'];
  const BALL_COLS   = STRIPE_COLS;

  function draw() {
    const sc = SC();
    ctx.save(); ctx.scale(sc, sc);

    // Background
    ctx.fillStyle = '#06060f';
    ctx.fillRect(0, 0, W, H);

    // Centre line
    ctx.setLineDash([10,9]); ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke(); ctx.setLineDash([]);

    // Particles
    particles.forEach(p => {
      ctx.globalAlpha=p.alpha; ctx.fillStyle=p.c;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha=1;

    // Rainbow ball
    const bc = BALL_COLS[Math.floor(rainbowT * BALL_COLS.length)];
    ctx.fillStyle = bc;
    ctx.beginPath(); ctx.arc(ball.x, ball.y, BR, 0, Math.PI*2); ctx.fill();

    // Player paddle
    const pg = ctx.createLinearGradient(PLAYER_X, player.y, PLAYER_X, player.y+PH);
    pg.addColorStop(0,'#2979FF'); pg.addColorStop(1,'#00C8FF');
    ctx.fillStyle = player.flash ? '#ffffff' : pg;
    ctx.beginPath(); ctx.roundRect(PLAYER_X, player.y, PW, PH, 6); ctx.fill();

    // ── AI paddle with Sohan's photo ────────────────────────────────── //
    // Photo avatar (circular) centred above right paddle
    const avcx = AI_X + PW/2;          // centre x of paddle
    const avcy = ai.y - PORTRAIT_R - 10; // just above paddle top

    // Draw circular portrait
    if (portrait.complete && portrait.naturalWidth) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(avcx, avcy, PORTRAIT_R, 0, Math.PI*2);
      ctx.clip();
      const imgSize = PORTRAIT_R*2;
      ctx.drawImage(portrait, avcx-PORTRAIT_R, avcy-PORTRAIT_R, imgSize, imgSize);
      ctx.restore();

      // Rainbow ring around portrait
      const ringGrd = ctx.createConicalGradient
        ? null
        : null; // fallback — just stroke with colour
      STRIPE_COLS.forEach((col, idx) => {
        const startA = (idx/STRIPE_COLS.length)*Math.PI*2 + rainbowT*Math.PI*2;
        const endA   = ((idx+1)/STRIPE_COLS.length)*Math.PI*2 + rainbowT*Math.PI*2;
        ctx.strokeStyle = col; ctx.lineWidth = 3.5; ctx.lineCap='round';
        ctx.beginPath(); ctx.arc(avcx, avcy, PORTRAIT_R+2.5, startA, endA); ctx.stroke();
      });
    }

    // Crown above portrait
    ctx.font = '20px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('👑', avcx, avcy - PORTRAIT_R - 12);

    // AI paddle body (thin strip)
    const ag = ctx.createLinearGradient(AI_X, ai.y, AI_X, ai.y+PH);
    STRIPE_COLS.forEach((c,i) => ag.addColorStop(i/(STRIPE_COLS.length-1),c));
    ctx.fillStyle = ai.flash ? '#ffffff' : ag;
    ctx.beginPath(); ctx.roundRect(AI_X, ai.y, PW, PH, 6); ctx.fill();

    // ── Voiceline speech bubble ──────────────────────────────────────── //
    if (currentLine && lineAlpha > 0 && lineTimer > 0) {
      ctx.save();
      ctx.globalAlpha = lineAlpha;

      const maxW = 220;
      const pad  = 12;
      ctx.font = 'bold 12px Inter, sans-serif';
      // Measure text
      const tw = Math.min(ctx.measureText(currentLine).width + pad*2, maxW);
      const bh = 38;
      const bx = AI_X - tw - 18;
      const by = Math.max(10, avcy - bh/2);

      // Bubble background
      ctx.fillStyle = 'rgba(10,5,25,0.92)';
      ctx.strokeStyle = '#AA00FF';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(bx, by, tw, bh, 10);
      ctx.fill(); ctx.stroke();

      // Bubble tail (pointing right toward Sohan)
      ctx.fillStyle = 'rgba(10,5,25,0.92)';
      ctx.strokeStyle = '#AA00FF';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(bx + tw,     by + bh/2 - 6);
      ctx.lineTo(bx + tw + 10, by + bh/2);
      ctx.lineTo(bx + tw,     by + bh/2 + 6);
      ctx.fill(); ctx.stroke();

      // Text (wrap if needed)
      ctx.fillStyle = '#f0f0ff';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 11.5px Inter, sans-serif';
      // Simple single-line (truncate)
      const display = currentLine.length > 32 ? currentLine.slice(0,31)+'…' : currentLine;
      ctx.fillText(display, bx + pad, by + bh/2);

      ctx.restore();
    }

    // Score reflections (subtle)
    ctx.globalAlpha = 0.18;
    ctx.font = 'bold 80px Playfair Display, serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle'; ctx.fillStyle = '#2979FF';
    ctx.fillText(scoreYou, 60, H/2);
    ctx.textAlign = 'right'; ctx.fillStyle = '#FF4DAD';
    ctx.fillText(scoreSohan, W-60, H/2);
    ctx.globalAlpha = 1;

    ctx.restore();
  }

  /* ═══════ LOOP ══════════════════════════════════════════════════════ */
  function loop() { update(); draw(); requestAnimationFrame(loop); }
  loop();
})();
</script>
</body>
